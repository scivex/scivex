# Advisories to ignore — all are transitive dependencies from database
# drivers (postgres, tiberius) and parquet compression (lz4_flex).
# We do not use these crates directly.

[advisories]
ignore = [
    "RUSTSEC-2024-0436",  # paste — unmaintained (transitive dep)
    "RUSTSEC-2025-0134",  # rustls-pemfile — unmaintained (transitive from tiberius)
    "RUSTSEC-2026-0002",  # lru — unsound IterMut (transitive from duckdb)
    "RUSTSEC-2026-0041",  # lz4_flex — decompression info leak (transitive from parquet)
    "RUSTSEC-2026-0049",  # rustls-webpki — CRL matching (transitive from tiberius)
    "RUSTSEC-2026-0067",  # tar — symlink chmod (transitive dep, not used directly)
    "RUSTSEC-2026-0068",  # tar — PAX size header (transitive dep, not used directly)
]
