[book]
title = "Scivex — The Rust Data Science Library"
authors = ["Scivex Contributors"]
language = "en"
multilingual = false
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/scivex/scivex"
edit-url-template = "https://github.com/scivex/scivex/edit/main/docs/{path}"
site-url = "/scivex/"
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false

[output.html.search]
enable = true
limit-results = 30
use-hierarchical-headings = true
